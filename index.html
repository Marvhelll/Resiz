<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e1306c">
  <meta name="description" content="Redimensionne tes photos au format carré Instagram">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=3">
  <title>Instagram Resizer</title>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span>Instagram Resizer</span>
      </div>
      <button id="btn-install" class="btn btn-outline" hidden>
        Installer l'app
      </button>
    </div>
  </header>

  <main>

    <!-- Zone drop / import (visible avant import) -->
    <section id="drop-zone" aria-label="Zone d'import d'image">
      <input type="file" id="file-input" accept="image/*" aria-label="Choisir une image">
      <div class="drop-content">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-title">Glisse une image ici</p>
        <p class="drop-sub">ou</p>
        <button class="btn btn-primary" id="btn-pick">Choisir une image</button>
        <p class="drop-formats">JPG, PNG, WEBP, HEIC...</p>
      </div>
    </section>

    <!-- Zone édition (cachée avant import) -->
    <section id="editor" hidden>

      <!-- Canvas de prévisualisation -->
      <div class="canvas-wrapper">
        <canvas id="preview" width="480" height="480" aria-label="Prévisualisation de l'image"></canvas>
        <button class="btn-change" id="btn-change" title="Changer d'image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Changer d'image
        </button>
      </div>

      <!-- Panneau de contrôles -->
      <div id="controls">

        <!-- Zoom -->
        <div class="control-group">
          <label class="control-label" for="zoom-slider">
            Zoom
            <span id="zoom-label" class="control-value">100%</span>
          </label>
          <div class="slider-row">
            <span class="slider-bound">10%</span>
            <input
              type="range"
              id="zoom-slider"
              min="10"
              max="200"
              step="1"
              value="100"
              aria-label="Zoom en pourcentage"
            >
            <span class="slider-bound">200%</span>
          </div>
          <button class="btn btn-ghost btn-sm" id="btn-reset-zoom">
            Remettre à 100%
          </button>
        </div>

        <div class="divider"></div>

        <!-- Taille d'export -->
        <div class="control-group">
          <label class="control-label" for="export-size">
            Taille d'export
          </label>
          <select id="export-size" aria-label="Taille d'export en pixels">
            <option value="1080">1080 px — standard Instagram</option>
            <option value="1200">1200 px — haute qualité</option>
            <option value="1500">1500 px — très haute qualité</option>
            <option value="custom">Personnalisé...</option>
          </select>
          <div id="custom-size-wrapper" hidden>
            <input
              type="number"
              id="custom-size"
              min="100"
              max="5000"
              placeholder="ex : 800"
              aria-label="Taille personnalisée en pixels"
            >
            <span class="input-unit">px</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Boutons export -->
        <div class="control-group">
          <label class="control-label">Télécharger</label>
          <div class="export-buttons">
            <button class="btn btn-primary" id="btn-jpg">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              JPG
            </button>
            <button class="btn btn-outline" id="btn-png">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              PNG
            </button>
          </div>
          <p class="export-info" id="export-info">Export : 1080 × 1080 px</p>
        </div>

      </div>
    </section>

  </main>

  <script src="app.js?v=3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
